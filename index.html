    // 현재 열려있는 말풍선(InfoWindow)을 추적하기 위한 변수
    var currentInfoWindow = null;

    // 3. 반복문을 통한 마커 생성 및 이벤트 등록
    for (var i = 0; i < positions.length; i++) {
        createMarker(positions[i]);
    }

    function createMarker(place) {
        // 마커를 생성합니다
        var marker = new kakao.maps.Marker({
            map: map,
            position: new kakao.maps.LatLng(place.lat, place.lng),
            title: place.title // 마커에 마우스를 올렸을 때 나오는 툴팁
        });

        // 말풍선에 들어갈 HTML 콘텐츠 구성
        var content = '<div class="info-window">' +
                      '    <h4>' + place.title + '</h4>' +
                      '    <p>' + place.address + '</p>' +
                      '</div>';

        // 말풍선(InfoWindow)을 생성합니다
        var infowindow = new kakao.maps.InfoWindow({
            content: content,
            removable: true // 닫기 버튼(X) 활성화
        });

        // 마커를 클릭했을 때 말풍선을 표시하는 이벤트를 등록합니다
        kakao.maps.event.addListener(marker, 'click', function() {
            // 이전에 열려있던 말풍선이 있다면 닫아줍니다 (동시 열림 방지)
            if (currentInfoWindow) {
                currentInfoWindow.close();
            }
            
            infowindow.open(map, marker);
            currentInfoWindow = infowindow;
        });
    }
</script>
